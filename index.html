<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css">
    <script src="./js/main.js" defer></script>
</head>

<body>
    <main class="main">
        <div class="container tracker-container">
            <header class="header">
                <h1 class="title">Expense Tracker</h1>
            </header>
            <section class="balance">
                <div class="balance-amount">
                    <h2 class="subtitle">YOUR BALANCE</h2>
                    <span class="total" id="balance">$0.00</span>
                </div>
                <div class="balance-summary">
                    <div class="summary-amount">
                        <p>INCOME</p>
                        <span class="total total-positive" id="income">$0.00</span>
                    </div>
                    <div class="vertical-line"></div>
                    <div class="expense-amount">
                        <p>EXPENSE</p>
                        <span class="total total-negative" id="expense">$0.00</span>
                    </div>
                </div>
            </section>
            <section class="transaction-history">
                <h2 class="subtitle">Transaction History</h2>
                <div class="horizontal-line"></div>
                <ul class="transactions transactions-none" id="transactions">
                    <li class="empty-transaction" id="emptyTransaction">
                        <span class="empty-state" id="emptyState">No transactions yet. Add one!</span>
                    </li>
                    <li class="transaction transaction--expense">
                        <div class="transaction__content">
                            <span>Lorem, ipsum.</span>
                            <span>-$0</span>
                        </div>
                    </li>
                    <li class="transaction transaction--expense">
                        <div class="transaction__content">
                            <span>Lorem, ipsum.</span>
                            <span>-$0</span>
                        </div>
                    </li>
                    <li class="transaction transaction--income">
                        <div class="transaction__content">
                            <span>Lorem, ipsum.</span>
                            <span>+$0</span>
                        </div>
                    </li>
                    <li class="transaction transaction--income">
                        <div class="transaction__content">
                            <span>Lorem, ipsum.</span>
                            <span>+$0</span>
                        </div>
                    </li>
                </ul>
            </section>
            <section class="add-transaction">
                <h2 class="subtitle">Add New Transaction</h2>
                <div class="horizontal-line"></div>
                <form class="form-transaction" id="transactionForm">
                    <div class="inputs">
                        <label for="description">Description</label>
                        <input type="text" name="description" id="description" class="input"
                            placeholder="Detail of Transaction" autocomplete="off" novalidate>
                    </div>
                    <div class="inputs">
                        <label for="amount">Transaction Amount</label>
                        <input type="number" step="0.01" name="amount" id="amount" class="input"
                            placeholder="Dollar Value of Transaction" autocomplete="off" novalidate>
                    </div>
                    <div class="inputs">
                        <label for="type">Select type</label>
                        <select name="type" id="type" class="input" novalidate>
                            <option value="" disabled selected>Select type</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <button type="submit" class="add-transaction-btn">Add transaction</button>
                </form>
            </section>
        </div>
    </main>
</body>

</html>
